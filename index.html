<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalashnikov | Home</title>
    <link rel="shortcut icon" href="ak47_favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
     <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>
 <div class="boss">
  <header class="header">
   <div class="logo_div">
   <model-viewer class="logo"
    src="ak_logo.glb" 
    alt="ak47_logo" 
    auto-rotate
    rotation-per-second="20deg" 
    interaction-prompt="none"
    shadow-intensity="1">
   </model-viewer>
    </div> 
   <nav class="nav">
    <div class="home">
     <span>HOME</span>   
    </div>
    <div class="contacts">
     <span>CONTACTS</span>   
    </div>
    <div class="about_us">
             <span>ABOUT US</span>   

    </div>
    <div class="shop">
             <span>SHOP</span>   

    </div>
   </nav> 
  </header>
  <div class="model_div">
   <model-viewer class="gtr"
    src="" 
    alt="ak47" 
    auto-rotate
    rotation-per-second="8deg" 
    interaction-prompt="none"
    shadow-intensity="2">
   </model-viewer>
  </div>
  <footer class="footer"></footer>
 </div>
</body>
</html>
